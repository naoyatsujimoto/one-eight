<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260">
  <!-- 背景 -->
  <rect width="720" height="260" fill="white"/>
  
  <!-- arrowhead marker定義 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrow-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  
  <!-- ===== 左半分: GATE図 ===== -->
  <!-- タイトル -->
  <text x="165" y="30" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold" fill="#1a1a1a">GATE</text>
  
  <!-- 正方形の枠線 (左上50,55 / 右上280,55 / 右下280,210 / 左下50,210) -->
  <rect x="50" y="55" width="230" height="155" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- コーナー丸点 -->
  <circle cx="50" cy="55" r="5" fill="#1a1a1a"/>
  <circle cx="280" cy="55" r="5" fill="#1a1a1a"/>
  <circle cx="280" cy="210" r="5" fill="#1a1a1a"/>
  <circle cx="50" cy="210" r="5" fill="#1a1a1a"/>
  
  <!-- 数字ラベル -->
  <text x="38" y="50" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">1</text>
  <text x="34" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">12</text>
  <text x="297" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">7</text>
  
  <!-- 矢印: 左上→右上 (上辺、左から右) -->
  <line x1="60" y1="55" x2="268" y2="55" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 矢印: 右上→右下 (右辺、上から下) -->
  <line x1="280" y1="65" x2="280" y2="198" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 矢印: 左下→左上 (左辺、下から上) -->
  <line x1="50" y1="198" x2="50" y2="67" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- ===== 右半分: POSITION図 ===== -->
  <!-- タイトル -->
  <text x="550" y="30" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="bold" fill="#1a1a1a">POSITION</text>
  
  <!-- 菱形の線（4頂点: 上540,60 / 左430,155 / 下540,250 / 右650,155） -->
  <!-- 上-左辺 -->
  <line x1="540" y1="65" x2="432" y2="153" stroke="#1a1a1a" stroke-width="2"/>
  <!-- 上-右辺 -->
  <line x1="540" y1="65" x2="648" y2="153" stroke="#1a1a1a" stroke-width="2"/>
  <!-- 左-下辺 -->
  <line x1="432" y1="155" x2="540" y2="243" stroke="#1a1a1a" stroke-width="2"/>
  <!-- 右-下辺 -->
  <line x1="648" y1="155" x2="540" y2="243" stroke="#1a1a1a" stroke-width="2"/>
  
  <!-- 頂点マーカー -->
  <circle cx="540" cy="65" r="5" fill="#1a1a1a"/>
  <circle cx="432" cy="155" r="5" fill="#1a1a1a"/>
  <circle cx="648" cy="155" r="5" fill="#1a1a1a"/>
  
  <!-- 文字ラベル -->
  <text x="540" y="52" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">A</text>
  <text x="415" y="160" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">G</text>
  <text x="665" y="160" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a">M</text>
  
  <!-- 矢印: A→M方向 (上から右へ斜め、破線) -->
  <line x1="548" y1="72" x2="638" y2="148" stroke="#1a1a1a" stroke-width="2" marker-end="url(#arrow-dash)" stroke-dasharray="5,3"/>
</svg>
